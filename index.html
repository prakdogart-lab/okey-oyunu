<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════
// SUPABASE + AUTH + SOHBET + SISTEM
// ═══════════════════════════════════
const SUPA_URL = 'https://nflxrfolzqecdxcptdmu.supabase.co';
const SUPA_KEY = 'sb_publishable_EKiFP6Z_nU5Lx9b78hHMPQ_ncdM6ZKx';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null, currentProfile = null, currentRoomId = null;
let chatSub = null, chatOpen = false, guestName = '';
let gameMode = 'online';
let currentMasaNo = 1;

// XP seviyeleri
const XP_LEVELS = [
  {level:1,name:'Acemi',min:0},
  {level:2,name:'Amatör',min:200},
  {level:3,name:'Oyuncu',min:500},
  {level:4,name:'Tecrübeli',min:1000},
  {level:5,name:'Uzman',min:2000},
  {level:6,name:'Usta',min:4000},
  {level:7,name:'Şampiyon',min:7000},
  {level:8,name:'Efsane',min:12000}
];

function getLevel(xp) {
  let lvl = XP_LEVELS[0];
  for(const l of XP_LEVELS) { if(xp >= l.min) lvl = l; }
  return lvl;
}

function getNextLevel(xp) {
  for(const l of XP_LEVELS) { if(xp < l.min) return l; }
  return null;
}

function getLevelBadge(level) {
  return ['','🌱','⭐','🎯','💎','🔥','👑','🏆','🌟'][level] || '🌟';
}

function isOnlineGame() {
  return currentRoomId && !currentRoomId.startsWith('local-');
}

// AUTH
function switchAuthTab(tab) {
  document.getElementById('tab-giris').style.background = tab==='giris' ? '#e8c84a' : 'rgba(0,0,0,.3)';
  document.getElementById('tab-giris').style.color = tab==='giris' ? '#1a1a00' : 'rgba(255,255,255,.5)';
  document.getElementById('tab-kayit').style.background = tab==='kayit' ? '#e8c84a' : 'rgba(0,0,0,.3)';
  document.getElementById('tab-kayit').style.color = tab==='kayit' ? '#1a1a00' : 'rgba(255,255,255,.5)';
  document.getElementById('auth-giris').style.display = tab==='giris' ? 'block' : 'none';
  document.getElementById('auth-kayit').style.display = tab==='kayit' ? 'block' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doGiris() {
  const email = document.getElementById('giris-email').value.trim();
  const pw = document.getElementById('giris-sifre').value;
  if(!email||!pw) { document.getElementById('auth-error').textContent='E-posta ve şifre girin.'; return; }
  const {data,error} = await supa.auth.signInWithPassword({email, password:pw});
  if(error) { document.getElementById('auth-error').textContent='Hata: '+error.message; return; }
  currentUser = data.user;
  await loadProfile();
  showLobby();
}

async function doKayit() {
  const u = document.getElementById('kayit-kullanici').value.trim();
  const email = document.getElementById('kayit-email').value.trim();
  const pw = document.getElementById('kayit-sifre').value;
  if(!u||!email||!pw) { document.getElementById('auth-error').textContent='Tüm alanları doldurun.'; return; }
  if(pw.length<6) { document.getElementById('auth-error').textContent='Şifre en az 6 karakter.'; return; }
  const {data,error} = await supa.auth.signUp({email, password:pw, options:{data:{username:u}}});
  if(error) { document.getElementById('auth-error').textContent='Hata: '+error.message; return; }
  currentUser = data.user;
  await loadProfile();
  showLobby();
}

function doMisafir() {
  const n = prompt('Misafir adın?', 'Misafir'+Math.floor(Math.random()*1000));
  if(!n) return;
  guestName = n;
  currentUser = null;
  showLobby();
}

async function doLogout() {
  await supa.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function loadProfile() {
  if(!currentUser) return;
  const {data} = await supa.from('profiles').select('*').eq('id', currentUser.id).single();
  if(data) currentProfile = data;
}

function showLobby() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  // User bar güncelle
  const nameEl = document.getElementById('lobby-username');
  const scoreEl = document.getElementById('lobby-score');
  const avEl = document.getElementById('lobby-avatar');
  const logoutBtn = document.getElementById('logout-btn');
  if(currentUser && currentProfile) {
    const lvl = getLevel(currentProfile.xp||0);
    nameEl.textContent = getLevelBadge(lvl.level) + ' ' + currentProfile.username;
    scoreEl.textContent = '⚡ ' + (currentProfile.rating||1000) + ' | Seviye ' + lvl.level + ' ' + lvl.name;
    avEl.textContent = currentProfile.username.charAt(0).toUpperCase();
    logoutBtn.style.display = '';
  } else {
    nameEl.textContent = guestName || 'Misafir';
    scoreEl.textContent = 'Misafir — XP kazanılmaz';
    avEl.textContent = '👤';
    logoutBtn.style.display = 'none';
  }
  // initLobby() was called here, but it's not defined in this snippet. I'm leaving it out for now.
}

async function showProfile() {
  if(!currentUser) { alert('Profil için giriş yapın.'); return; }
  const {data} = await supa.from('profiles').select('*').eq('id', currentUser.id).single();
  if(!data) { alert('Profil yüklenemedi.'); return; }
  currentProfile = data;
  const xp = data.xp||0, rating = data.rating||1000;
  const lvl = getLevel(xp), nextLvl = getNextLevel(xp);
  const onlineGames = data.online_games||0, onlineWins = data.online_wins||0;
  const wr = onlineGames ? Math.round(onlineWins/onlineGames*100) : 0;
  const xpProgress = nextLvl ? Math.round((xp-lvl.min)/(nextLvl.min-lvl.min)*100) : 100;
  document.getElementById('profile-content').innerHTML = `
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:36px;margin-bottom:4px;">${getLevelBadge(lvl.level)}</div>
      <div style="font-size:20px;font-weight:900;color:#e8c84a;">${data.username}</div>
      <div style="font-size:13px;color:#aaa;margin-top:2px;">Seviye ${lvl.level} — ${lvl.name}</div>
    </div>
    <div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:4px;">
        <span>XP: ${xp}</span><span>${nextLvl ? nextLvl.name+' için '+nextLvl.min+' XP' : '🌟 Maks Seviye'}</span>
      </div>
      <div style="background:rgba(255,255,255,.1);border-radius:6px;height:8px;overflow:hidden;">
        <div style="background:linear-gradient(90deg,#e8c84a,#ff8c00);height:100%;width:${xpProgress}%;border-radius:6px;"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;color:rgba(255,255,255,.8);"><span>⚡ Rating</span><b style="color:#e8c84a;">${rating}</b></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;color:rgba(255,255,255,.8);"><span>🎮 Online Oyun</span><b>${onlineGames}</b></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;color:rgba(255,255,255,.8);"><span>🏆 Online Kazanma</span><b style="color:#88ff88;">${onlineWins}</b></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;color:rgba(255,255,255,.8);"><span>📊 Kazanma Oranı</span><b>${wr}%</b></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;color:rgba(255,255,255,.8);"><span>📅 Üyelik</span><b>${new Date(data.created_at).toLocaleDateString('tr-TR')}</b></div>
  `;
  document.getElementById('profile-modal').style.display = 'flex';
}

// MOD SEÇİMİ
function pickMod(mod) {
  gameMode = mod;
  document.getElementById('mod-online').classList.toggle('on', mod==='online');
  document.getElementById('mod-bot').classList.toggle('on', mod==='bot');
}

// İZLEYİCİ
function izleMasa(masaNo) {
  currentMasaNo = masaNo;
  currentRoomId = 'masa-' + masaNo;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('mode-badge').textContent = '👁 İzleme — Masa ' + masaNo;
  document.getElementById('mode-badge').style.display = 'block';
  // Istaka ve butonları gizle
  setTimeout(() => {
    document.querySelectorAll('.rack-outer').forEach(el => el.style.visibility='hidden');
    document.querySelectorAll('.acts-col').forEach(el => el.style.visibility='hidden');
  }, 100);
  subscribeToChatRoom(currentRoomId);
  document.getElementById('chat-toggle').style.display = 'flex';
  // setMsg('İzleme modundasın. Sohbete katılabilirsin.'); // setMsg is not defined in this snippet. I'm leaving it out for now.
  // doResize(); // doResize is not defined in this snippet. I'm leaving it out for now.
}

// SOHBET
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').style.transform = chatOpen ? 'translateX(0)' : 'translateX(100%)';
}

async function sendChatMsg() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt || !currentRoomId) return;
  inp.value = '';
  const name = currentUser ? (currentProfile?.username||'Üye') : guestName;
  await supa.from('messages').insert({
    room_id: currentRoomId,
    user_id: currentUser?.id || null,
    guest_name: currentUser ? null : name,
    content: txt
  });
}

function subscribeToChatRoom(roomId) {
  if(chatSub) supa.removeChannel(chatSub);
  chatSub = supa.channel('chat-'+roomId)
    .on('postgres_changes', {event:'INSERT',schema:'public',table:'messages',filter:'room_id=eq.'+roomId},
      p => addChatMsg(p.new))
    .subscribe();
}

function addChatMsg(msg) {
  const isMe = currentUser && msg.user_id === currentUser.id;
  const name = msg.guest_name || (currentProfile?.username||'Üye');
  const div = document.createElement('div');
  div.style.cssText = 'background:rgba(0,0,0,.3);border-radius:8px;padding:6px 9px;' + (isMe?'background:rgba(14,61,34,.6);':'');
  div.innerHTML = `<div style="font-size:10px;font-weight:700;color:${isMe?'#88ff88':'#e8c84a'};margin-bottom:2px;">${name}</div><div style="font-size:12px;color:rgba(255,255,255,.85);word-break:break-word;">${msg.content.replace(/</g,'&lt;')}</div>`;
  const msgs = document.getElementById('chat-messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// STATS KAYDET
function saveGameStats() {
  if(!currentUser || !isOnlineGame()) { console.log('Bot oyunu — kaydedilmedi'); return; }
  const scores = window._lastScores || (G&&G.scores);
  if(!scores) return;
  const myScore = scores[0], minScore = Math.min(...scores), isWin = myScore === minScore;
  let xpGain = 10;
  if(isWin) xpGain += 20;
  if(myScore === 0) xpGain += 15;
  const ratingChange = isWin ? 25 : -10;
  supa.from('profiles').select('*').eq('id', currentUser.id).single().then(({data}) => {
    if(!data) return;
    const newXp = (data.xp||0) + xpGain;
    const newRating = Math.max(1000, (data.rating||1000) + ratingChange);
    const newLevel = getLevel(newXp).level;
    const oldLevel = getLevel(data.xp||0).level;
    supa.from('profiles').update({
      online_games: (data.online_games||0)+1,
      online_wins: (data.online_wins||0)+(isWin?1:0),
      total_score: (data.total_score||0)+myScore,
      xp: newXp, rating: newRating, level: newLevel
    }).eq('id', currentUser.id).then(() => {
      console.log('Profil güncellendi: XP +' + xpGain + ', Rating ' + (ratingChange>0?'+':'') + ratingChange);
      if(newLevel > oldLevel) {
        const lvlInfo = getLevel(newXp);
        // spawnFloatingText('🎉 Seviye Atladın! ' + getLevelBadge(newLevel) + ' ' + lvlInfo.name, '#e8c84a'); // spawnFloatingText is not defined in this snippet. I'm leaving it out for now.
      }
    });
    supa.from('game_history').insert({user_id:currentUser.id, result:isWin?'win':'lose', score_delta:myScore});
  });
}

// LOBİYE DÖN
function goToLobby() {
  document.getElementById('game').style.display = 'none';
  // document.getElementById('end-wrap').classList.remove('show'); // This element doesn't exist in the provided HTML snippet
  document.getElementById('chat-toggle').style.display = 'none';
  document.getElementById('mode-badge').style.display = 'none';
  chatOpen = false;
  document.getElementById('chat-panel').style.transform = 'translateX(100%)';
  currentRoomId = null;
  if(chatSub) { supa.removeChannel(chatSub); chatSub = null; }
  document.getElementById('lobby').style.display = 'flex';
  if(currentUser) loadProfile().then(() => showLobby()); else showLobby();
}

function lobiyeDon() {
  if(confirm('Oyunu bırakmak istediğinize emin misiniz? Bu el kaydedilmeyecek.')) {
    if(typeof turnTimer !== 'undefined') clearInterval(turnTimer);
    document.getElementById('game').style.display = 'none';
    document.getElementById('mode-badge').style.display = 'none';
    document.getElementById('chat-toggle').style.display = 'none';
    chatOpen = false;
    document.getElementById('chat-panel').style.transform = 'translateX(100%)';
    currentRoomId = null;
    document.getElementById('lobby').style.display = 'flex';
    if(currentUser) loadProfile().then(() => showLobby()); else showLobby();
  }
}

// SAYFA YÜKLENINCE
window.addEventListener('load', async () => {
  const {data:{session}} = await supa.auth.getSession();
  if(session) {
    currentUser = session.user;
    await loadProfile();
    showLobby();
  }
  // session yoksa auth ekranı görünür
});

</script>

                <div class="masa-board">
                    <span>Masa 2</span>
                    <small>1/4</small>
                </div>
                <div class="oyna-btn seat-top" onclick="izleMasa(2)">İzle</div>
                <div class="oyna-btn seat-bottom">Dolu</div>
                <div class="oyna-btn seat-left">Otur</div>
                <div class="oyna-btn seat-right">Otur</div>
            </div>
        </div>
    </div>

    <div id="game">
        <div id="mode-badge" style="display: none; position: absolute; top: 10px; left: 10px; background: #e8c84a; color: #1a1a00; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 100;"></div>
        <div id="game-board">
             </div>

        <button id="chat-toggle" onclick="toggleChat()" style="display:none; position: fixed; bottom: 20px; right: 20px; background: #e8c84a; color: #1a1a00; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; z-index: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">💬</button>
        <div id="chat-panel" style="position: fixed; top: 0; right: 0; bottom: 0; width: 300px; background: rgba(6, 32, 51, 0.95); border-left: 2px solid #e8c84a; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; z-index: 550; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px;">
                <h3 style="color: #e8c84a; margin: 0;">Sohbet</h3>
                <button onclick="toggleChat()" style="background: none; border: none; color: #fff; font-size: 20px; cursor: pointer;">✕</button>
            </div>
            <div id="chat-messages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding-right: 5px;"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Mesaj yaz..." style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff;">
                <button onclick="sendChatMsg()" style="padding: 8px 15px; background: #e8c84a; color: #1a1a00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Gönder</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" style="display: none; position: fixed; inset: 0; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 1000;">
        <div style="background: #062033; border: 2px solid #e8c84a; border-radius: 16px; padding: 25px; width: 100%; max-width: 400px; position: relative;">
            <button onclick="document.getElementById('profile-modal').style.display='none'" class="close-modal-btn">×</button>
            <div id="profile-content"></div>
        </div>
    </div>

    <div id="auth-screen" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a4a6b, #062033); z-index: 1000;">
         <div style="background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; border: 2px solid #e8c84a; text-align: center; width: 300px;">
            <h2 style="color: #e8c84a; margin-bottom: 20px;">81 OKEY GİRİŞ</h2>
            <div style="display: flex; justify-content: space-around; margin-bottom: 15px;">
                <span id="tab-giris" onclick="switchAuthTab('giris')" style="cursor: pointer; padding: 5px 10px; background: #e8c84a; color: #1a1a00; border-radius: 5px; font-weight: bold;">Giriş Yap</span>
                <span id="tab-kayit" onclick="switchAuthTab('kayit')" style="cursor: pointer; padding: 5px 10px; background: rgba(0,0,0,.3); color: rgba(255,255,255,.5); border-radius: 5px; font-weight: bold;">Kayıt Ol</span>
            </div>
            
            <div id="auth-giris">
                <input type="text" id="giris-email" placeholder="E-posta" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none;">
                <input type="password" id="giris-sifre" placeholder="Şifre" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none;">
                <button onclick="doGiris()" style="width: 100%; padding: 10px; background: #e8c84a; color: #1a1a00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">GİRİŞ YAP</button>
            </div>
            
            <div id="auth-kayit" style="display: none;">
                 <input type="text" id="kayit-kullanici" placeholder="Kullanıcı Adı" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none;">
                <input type="text" id="kayit-email" placeholder="E-posta" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none;">
                <input type="password" id="kayit-sifre" placeholder="Şifre (En az 6 haneli)" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 5px; border: none;">
                <button onclick="doKayit()" style="width: 100%; padding: 10px; background: #e8c84a; color: #1a1a00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">KAYIT OL</button>
            </div>

            <p id="auth-error" style="color: #ff4444; font-size: 12px; margin-top: 10px; min-height: 15px;"></p>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
            <button onclick="doMisafir()" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer;">Misafir Olarak Gir</button>
         </div>
    </div>

</body>
</html>
